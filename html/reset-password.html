<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="header">
      <div class="header-container">
          <div class="logo-section">
              <img src="../content/img/simba.png" alt="SIMBA PROJECT Logo" class="logo">
          </div>
          
          <nav class="navbar">
              <ul class="nav-list">
                  <li><a href="index.html" class="nav-link">Thematics</a></li>
                  <li><a href="test.html" class="nav-link">Test</a></li>
                  <li><a href="contact.html" class="nav-link">Contact Us</a></li>
                  <li><a href="about-us.html" class="nav-link">About Us</a></li>
              </ul>
          </nav>
          
          <div class="auth-section">
              <button class="sign-up-btn">Sign Up</button>
              <button class="login-btn">Login</button>
          </div>
      </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h2>Reset Password</h2>
      <form id="resetForm">
        <div class="form-group">
          <label for="password">New password</label>
          <input id="password" type="password" required minlength="6">
        </div>
        <div class="auth-actions">
          <div></div>
          <div><button type="submit" class="btn">Set password</button></div>
        </div>
      </form>
      <div id="msg" style="margin-top:1rem"></div>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const form = document.getElementById('resetForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async function(e){
      e.preventDefault();
      const password = document.getElementById('password').value;
      if (!token) { msg.innerText = 'Missing token'; return; }
      try {
        const res = await fetch('/api/reset-password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({token, password}), credentials: 'include' });
        const data = await res.json();
        if (!res.ok) msg.innerText = data.error || 'Error';
        else { msg.innerText = 'Password updated. You can now Login.'; setTimeout(()=>window.location.href='login.html',1500); }
      } catch (err) { msg.innerText='Network error'; }
    });
  </script>

  <!-- FOOTER -->
  <footer class="footer">
      <div class="footer-container">
          <div class="footer-content">
              <p>&copy; 2024 SIMBA PROJECT - Hero's Journey. All rights reserved.</p>
              <p class="footer-links"><a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutzerklärung</a></p>
          </div>
          <div class="social-links">
              <a href="https://youtube.com" target="_blank" class="social-icon">
                  <img src="../content/img/youtube.png" alt="YouTube">
              </a>
              <a href="https://www.instagram.com/the.simba.journey/" target="_blank" class="social-icon">
                  <img src="../content/img/instagram.png" alt="Instagram">
              </a>
              <a href="https://wa.me" target="_blank" class="social-icon">
                  <img src="../content/img/whatsapp.png" alt="WhatsApp">
              </a>
          </div>
      </div>
  </footer>

  <!-- COOKIE BANNER -->
  <div id="cookieBanner" class="cookie-banner" aria-live="polite" hidden>
      <div class="cookie-inner">
          <p>Wir verwenden Cookies, um diese Website zu verbessern. Mehr dazu in unserer <a href="datenschutz.html">Datenschutzerklärung</a>.</p>
          <div class="cookie-actions">
              <button id="acceptCookies" class="btn">Alle akzeptieren</button>
              <button id="rejectCookies" class="btn btn-secondary">Ablehnen</button>
              <button id="manageCookies" class="btn btn-link">Einstellungen</button>
          </div>
      </div>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
