        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Montserrat';
            src: url('../content/fonts/Montserrat/static/Montserrat-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Montserrat';
            src: url('../content/fonts/Montserrat/static/Montserrat-SemiBold.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Montserrat';
            src: url('../content/fonts/Montserrat/static/Montserrat-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Forum';
            src: url('../content/fonts/Forum/Forum-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --color-cream: #E8E1D6;
            --color-orange-dark: #B8651C;
            --color-orange: #C4721A;
            --color-navy: #2E3F5F;
            --color-navy-dark: #1F2E44;
            --color-orange-light: #D48734;
            --color-blue-light: #405477;
            --color-cream-light: #DDD5C6;

            --font-forum: 'Forum', serif;
            --font-montserrat: 'Montserrat', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-montserrat);
            color: var(--color-navy);
            background: linear-gradient(135deg, #E8E1D6 0%, #f5f2ed 50%, #E8E1D6 100%);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--color-navy-dark) 0%, var(--color-navy) 100%);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(31, 46, 68, 0.2);
            backdrop-filter: blur(10px);
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 0 0;
        }
        .logo-section { flex: 0 0 auto; margin-right: auto; }
        .logo {
            height: 70px;
            width: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.05); }
        .navbar { flex: 1; display: flex; justify-content: center; }
        .nav-list { display: flex; list-style: none; gap: 2.5rem; }
        .nav-link {
            color: var(--color-cream);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid transparent;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--color-orange);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link:hover, .nav-link.active { color: var(--color-orange); }

        .auth-section { display: flex; gap: 1.2rem; flex: 0 0 auto; align-items: center; flex-wrap: wrap; }

        .sign-up-btn, .login-btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-montserrat);
        }
        .sign-up-btn {
            background: linear-gradient(135deg, var(--color-orange) 0%, var(--color-orange-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(196, 114, 26, 0.3);
        }
        .sign-up-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196, 114, 26, 0.4);
        }
        .login-btn {
            background-color: transparent;
            color: var(--color-cream);
            border: 2px solid var(--color-cream);
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            background-color: var(--color-cream);
            color: var(--color-navy-dark);
            box-shadow: 0 4px 15px rgba(232, 225, 214, 0.3);
        }

        /* THEME PAGE HEADER (hero banner) */
        .theme-page-header {
            position: relative;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        .theme-page-header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(31, 46, 68, 0.6) 0%, rgba(46, 63, 95, 0.5) 100%);
            z-index: 2;
        }
        .theme-page-header h1 {
            position: relative;
            z-index: 3;
            font-size: 3rem;
            font-family: var(--font-forum);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .theme-page-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        .theme-page-content h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--color-navy);
            font-family: var(--font-forum);
        }
        .theme-page-content p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--color-blue-light);
            margin-bottom: 1.5rem;
        }

        /* FOOTER */
        .footer {
            background: linear-gradient(135deg, var(--color-navy-dark) 0%, var(--color-navy) 100%);
            color: var(--color-cream);
            padding: 3rem 2rem;
            margin-top: 5rem;
            box-shadow: 0 -8px 32px rgba(31, 46, 68, 0.15);
        }
        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .footer-content { flex: 1; min-width: 250px; }
        .footer-content p { font-size: 0.95rem; opacity: 0.9; }
        .footer-links { margin-top: 0.6rem; }
        .footer-links a {
            color: var(--color-cream);
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            transition: background 0.2s ease, color 0.2s ease;
        }
        .footer-links a:hover { background: rgba(255,255,255,0.08); color: var(--color-orange-light); }
        .footer-links a + a { margin-left: 0.6rem; }

        .social-links { display: flex; gap: 2.5rem; align-items: center; }
        .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            opacity: 0.8;
            transition: all 0.3s ease;
        }
        .social-icon:hover { opacity: 1; transform: scale(1.2) translateY(-3px); }
        .social-icon img {
            object-fit: contain;
            object-position: center;
            filter: brightness(0) invert(1);
        }
        .social-icon:nth-child(1) img { width: 120%; height: 120%; }
        .social-icon:nth-child(2) img { width: 110%; height: 110%; }
        .social-icon:nth-child(3) img { width: 100%; height: 100%; }

        /* COOKIE BANNER */
        .cookie-banner {
            position: fixed;
            left: 1rem; right: 1rem; bottom: 1rem;
            background: rgba(31,46,68,0.95);
            color: #fff;
            border-radius: 10px;
            padding: 1rem 1.2rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            z-index: 9999;
            border-left: 4px solid var(--color-orange);
        }
        .cookie-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .cookie-inner p { margin: 0; color: #f1f1f1; flex: 1 1 60%; margin-right: 1rem; }
        .cookie-actions { display: flex; gap: 0.6rem; align-items: center; flex: 0 0 auto; }
        .btn { background: var(--color-orange); color: white; border: none; padding: 0.5rem 0.9rem; border-radius: 6px; cursor: pointer; font-weight:600; }
        .btn-secondary { background: transparent; color: #f1f1f1; border: 1px solid rgba(255,255,255,0.15); }
        .btn-link { background: transparent; color: #f1f1f1; border: none; text-decoration: underline; }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; gap: 1rem; padding: 1rem; }
            .nav-list { gap: 1.5rem; font-size: 0.85rem; }
            .auth-section { width: 100%; gap: 1rem; }
            .sign-up-btn, .login-btn { flex: 1; padding: 0.6rem 1rem; }
            .theme-page-header h1 { font-size: 2rem; }
            .cookie-inner { flex-direction: column; align-items: stretch; }
            .cookie-actions { justify-content: flex-end; }
        }

        /* ===== PAGE-SPECIFIC HERO IMAGE =====
           The gradient acts as a fallback so the banner still looks good
           even if attachment.png hasn't been placed at that path yet. */
        .theme-page-header {
            background-image:
                linear-gradient(135deg, rgba(31,46,68,0.35) 0%, rgba(196,114,26,0.25) 100%),
                url('../content/img/attachment.png');
            background-color: var(--color-navy-dark);
        }

        
    </style>
</head>
